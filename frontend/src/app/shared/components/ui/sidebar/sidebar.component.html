<aside class="dashboard-sidebar">
  <div class="brand-block">
    <div class="brand-mark">
      <span class="material-symbols-outlined filled">school</span>
    </div>
    <div>
      <h2>Interrapidisimo</h2>
      <p>Portal académico</p>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a
      [routerLink]="'/dashboard'"
      routerLinkActive="nav-link-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link">
      <span class="material-symbols-outlined filled">dashboard</span>
      <span>Panel</span>
    </a>

    <a
      [routerLink]="misMateriasRoute()"
      routerLinkActive="nav-link-active"
      class="nav-link">
      <span class="material-symbols-outlined">assignment</span>
      <span>Mis Materias</span>
    </a>

    <a
      [routerLink]="'/subjects'"
      routerLinkActive="nav-link-active"
      class="nav-link">
      <span class="material-symbols-outlined">menu_book</span>
      <span>Materias</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    @if (session.currentStudent(); as student) {
      <div class="info-card">
        <h4>{{ student.fullName }}</h4>
        <p>{{ student.email }}</p>
      </div>
    }

    <div class="info-card">
      <h4>Sistema de créditos</h4>
      <p>Máximo 3 materias, 3 créditos cada una. 9 créditos máximos por estudiante.</p>
    </div>

    <button type="button" class="footer-link" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Cerrar sesión</span>
    </button>
  </div>
</aside>
