<aside class="dashboard-sidebar" [class.sidebar-open]="isOpen()">
  <button class="sidebar-close-btn" (click)="close()" aria-label="Cerrar menú">
    <span class="material-symbols-outlined">close</span>
  </button>

  <div class="brand-block">
    <img src="images/logo-inter-png1-1024x216.png" alt="Interrapidisimo" class="sidebar-logo" />
  </div>

  <nav class="sidebar-nav">
    <a
      [routerLink]="'/dashboard'"
      routerLinkActive="nav-link-active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link"
      (click)="close()">
      <span class="material-symbols-outlined filled">dashboard</span>
      <span>Panel</span>
    </a>

    <a
      [routerLink]="misMateriasRoute()"
      routerLinkActive="nav-link-active"
      class="nav-link"
      (click)="close()">
      <span class="material-symbols-outlined">assignment</span>
      <span>Mis Materias</span>
    </a>

    <a
      [routerLink]="'/subjects'"
      routerLinkActive="nav-link-active"
      class="nav-link"
      (click)="close()">
      <span class="material-symbols-outlined">menu_book</span>
      <span>Materias</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    @if (session.currentStudent(); as student) {
      <div class="info-card">
        <h4>{{ student.fullName }}</h4>
        <p>{{ student.email }}</p>
      </div>
    }

    <div class="info-card">
      <h4>Sistema de créditos</h4>
      <p>Máximo 3 materias, 3 créditos cada una. 9 créditos máximos por estudiante.</p>
    </div>

    <button type="button" class="footer-link" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Cerrar sesión</span>
    </button>
  </div>
</aside>
