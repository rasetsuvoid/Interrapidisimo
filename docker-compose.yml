services:

  # ── SQL Server ─────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "${SA_PASSWORD}"
        - -Q
        - SELECT 1
        - -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── .NET API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=InterrapidisimoDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=True;"
      Jwt__Issuer: "Interrapidisimo.API"
      Jwt__Audience: "Interrapidisimo.Frontend"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__ExpiresMinutes: "120"
      Cors__AllowedOrigins__0: "http://localhost"
    depends_on:
      db:
        condition: service_healthy

  # ── Angular (nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  sqldata:
